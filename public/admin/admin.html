<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellNest | Admin Login</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    
    <!-- Central scripts -->
    <script src="../assets/js/config.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/utilities.js" defer></script>
    <script src="../assets/js/admin.js" defer></script>
</head>
<body>
    
    <header>
        <h1>WellNest - Admin</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <form id="admin-login-form">
            <h2>Log In as Administrator</h2>
            
            <div class="form-group">
                <label for="adminpasswd">Admin Secret Password</label>
                <input type="password" id="adminpasswd" placeholder="Enter Admin Secret Key" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Log In</button>
        </form>
    </main>

    <footer>
        &copy; 2025 WellNest - Safety & Well-being
    </footer>

</body>
</html>
