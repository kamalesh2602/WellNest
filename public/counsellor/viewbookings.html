<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellNest | Scheduled Appointments</title>
    <link rel="stylesheet" href="../assets/css/counsellor.css">
    
    <!-- Scripts -->
    <script src="../assets/js/config.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/utilities.js" defer></script>
    <script src="../assets/js/viewbookings.js" defer></script>
</head>
<body>
    
    <header>
        <h1>WellNest - Counsellor</h1>
        <nav>
            <ul>
                <li><button onclick="AUTH.logout()" class="btn btn-danger" style="padding: 6px 15px;">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <a href="cdashboard.html" class="back-nav">← Back to Dashboard</a>
        
        <h2 id="counsellor-title" style="text-align: left; margin-bottom: 20px; color: var(--primary-color);">Scheduled Appointments</h2>
        
        <!-- Bookings placeholder dynamic rendering -->
        <div id="bookings-container"></div>

        <!-- Meeting Consultation Frame container -->
        <div id="meetingFrameContainer">
            <div style="background-color: var(--primary-color); color: white; padding: 10px 20px; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span>Active consultation call</span>
                <button class="btn btn-danger" style="padding: 4px 10px; font-size: 12px;" onclick="document.getElementById('meetingFrameContainer').style.display='none'; document.getElementById('meetingFrame').src=''">Disconnect Call</button>
            </div>
            <iframe id="meetingFrame" allow="camera; microphone; display-capture"></iframe>
        </div>
    </main>

    <footer>
        &copy; 2025 WellNest - Safety & Well-being
    </footer>

</body>
</html>
