<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellNest | Counsellor Login</title>
    <link rel="stylesheet" href="../assets/css/counsellor.css">
    
    <!-- Scripts -->
    <script src="../assets/js/config.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/utilities.js" defer></script>
    <script src="../assets/js/clogin.js" defer></script>
</head>
<body>
    
    <header>
        <h1>WellNest</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <form id="counsellor-login-form">
            <h2>Counsellor Portal Log In</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter Registered Email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Log In</button>
        </form>
    </main>

    <footer>
        <h3>Wanted to be a WellNest Counsellor? <a href="mailto:23z332@psgtech.ac.in" style="color: var(--primary-color);">Contact Support</a></h3>
        <p>&copy; 2025 WellNest - Safety & Well-being</p>
    </footer>

</body>
</html>
