<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellNest | Create Slots</title>
    <link rel="stylesheet" href="../assets/css/counsellor.css">
    
    <!-- Scripts -->
    <script src="../assets/js/config.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/utilities.js" defer></script>
    <script src="../assets/js/createslots.js" defer></script>
</head>
<body>
    
    <header>
        <h1>WellNest - Counsellor</h1>
        <nav>
            <ul>
                <li><button onclick="AUTH.logout()" class="btn btn-danger" style="padding: 6px 15px;">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <a href="cdashboard.html" class="back-nav">← Back to Dashboard</a>
        
        <form id="createslots-form">
            <h2>Add Availability Slot</h2>
            
            <div class="form-group">
                <label for="slotdate">Consultation Date</label>
                <input type="date" id="slotdate" required>
            </div>
            
            <div class="form-group">
                <label for="slottime">Consultation Time</label>
                <input type="time" id="slottime" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Slot</button>
        </form>
    </main>

    <footer>
        &copy; 2025 WellNest - Safety & Well-being
    </footer>

</body>
</html>
